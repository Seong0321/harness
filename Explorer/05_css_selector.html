<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 선택자</title>
    <style>
        p {
            color: grey;
        }
        .class-style1{
            color: green;
        }
        .class-style2{
            color: red;
        }
        #id-style{
            color: yellow;
        }
        .class-style3{
            color: blue;
        }
        </style>
    
</head>
<body>
    <p>태그 선택자</p>
    <p class="class-style1">클래스 선택자</p>
    <p class="class-style1 class-style2 class-style3">클래스 선택자</p>
    <p id="id-style" class="class-style3">아이디 선택자</p>
    

    
</body>
</html>
